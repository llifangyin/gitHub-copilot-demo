name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main   # 你的主分支

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # ⚠️ 关键：告诉 GitHub Pages 用哪个目录
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist   # 👈 Vite 用 dist，CRA 改成 build

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4